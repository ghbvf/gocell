name: Build / Lint / Test (reusable)

# Reusable workflow — called by ci.yml (push, full lint) and pr-check.yml
# (pull_request, merge-base diff lint).
# ref: grpc-go workflow separation (testing.yml + pr-validation.yml); this
# variant uses workflow_call to eliminate DRY duplication that grpc-go leaves
# in its two files.
on:
  workflow_call:
    inputs:
      lint-mode:
        description: '"full" runs golangci-lint with no filter (push baseline). "pr" uses --new-from-merge-base=origin/<base-ref> to suppress pre-existing noise on pull requests.'
        type: string
        required: true
      base-ref:
        description: 'For lint-mode=pr: the PR target branch name (e.g. "develop", "main"). Ignored when lint-mode=full.'
        type: string
        default: develop
      run-integration:
        description: 'When true, runs the integration-test job (testcontainers, ~10m). Default false.'
        type: boolean
        default: false
      run-sonar:
        description: 'When true, runs the sonarcloud job (needs both build-test + integration-test coverage). Default false. Requires secrets.SONAR_TOKEN. Must not be true when run-integration is false — sonarcloud needs both coverage profiles.'
        type: boolean
        default: false
      run-os-smoke:
        description: 'When true, runs the os-smoke matrix job on macOS and Windows to verify cross-platform unit behaviour. Default false.'
        type: boolean
        default: false
      run-examples-smoke:
        description: 'When true, runs the examples-smoke job that boots examples/ssobff as a subprocess and asserts /readyz within 5s. Default false. Runs in parallel with build-test and integration-test — does not extend wall-time.'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # build-test is a matrix of 5 package shards run in parallel. Sharding splits
  # GoCell's package layout (kernel/tools/runtime/cells/adapters+others) so each
  # shard's timing maps cleanly to an architectural boundary, making per-shard
  # cost easy to interpret. Static (tools/) and concurrency-sensitive
  # (kernel/runtime) shards account for the bulk of test time; isolating tools
  # cut the critical path from ~340s to ~170s.
  #
  # Race-detector responsibility lives in the dedicated test-race.yml workflow,
  # not here. build-test is purely build / lint / coverage. Swap to dynamic
  # sharding (consul-style `go list | shuf | split`) if shard timings diverge > 2x.
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: kernel
            pkgs: ./kernel/...
            static_checks: true
          - shard: tools
            # archtest / metricschema / generatedverify use go/packages to load
            # the full module type graph; they are the slowest test suite (~130s)
            # and are isolated here so they run in parallel with the kernel shard.
            pkgs: ./tools/...
            static_checks: false
          - shard: runtime
            pkgs: ./runtime/... ./pkg/...
            static_checks: false
          - shard: cells
            pkgs: ./cells/...
            static_checks: false
          - shard: others
            pkgs: ./adapters/... ./cmd/... ./examples/... ./tests/... ./contracts/...
            static_checks: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so `golangci-lint --new-from-merge-base=origin/<base-ref>`
          # can run `git merge-base` successfully. Only the kernel shard actually
          # runs golangci-lint, but fetch-depth: 0 is cheap at this repo size and
          # keeping it uniform avoids conditional checkout complexity.
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      # Static checks (Build, Vet, golangci-lint, validate/check commands, layering
      # guard, kernel coverage gate) run only on the kernel shard. Running them on
      # every shard would cost 4x runner minutes for no signal — each step is
      # repo-global (no package scoping) and its verdict does not depend on which
      # shard is executing. Hosting them on the kernel shard (the smallest test
      # load at ~22k lines / 17.9%) also gives the fastest fail-fast path when a
      # lint regression is introduced.
      - name: Build
        if: matrix.static_checks
        run: go build ./...

      - name: Vet
        if: matrix.static_checks
        run: go vet ./...

      - name: golangci-lint
        if: matrix.static_checks
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          # `verify: true` runs `golangci-lint config verify` before linting so a
          # broken `.golangci.yml` (v2 schema typo, unknown linter, malformed
          # exclusions) fails fast instead of silently degrading to v1 parsing
          # where new linters are ignored. Pinned to v2.11.4 (matches local dev
          # tool version) to keep CI and local lint behaviour identical.
          verify: true
          # only-new-issues uses the GitHub pull-request diff API which
          # refuses diffs larger than 300 files; fall back to
          # --new-from-merge-base so mass-rename PRs (repo-wide renames,
          # metadata id sweeps) still get "new issue" filtering.
          # On push (lint-mode: full) no filter is applied — every issue is
          # surfaced so the develop branch stays clean as an absolute baseline.
          # On pr (lint-mode: pr) use origin/<base-ref> so PRs targeting main
          # or release/* lint against their actual merge-base, not develop.
          args: ${{ inputs.lint-mode == 'pr' && format('--new-from-merge-base=origin/{0}', inputs.base-ref) || '' }}

      # Test step: per-shard coverage profile with covermode=atomic. Atomic is
      # harmless without -race and keeps a single mode across all shards so
      # sonarcloud's cat-merge does not hit mode-header conflicts.
      # -coverpkg=./... was previously used here but dropped: every major Go OSS
      # project (grpc-go, prometheus, consul, etcd, tidb, cockroachdb) tests
      # without it, and with per-shard package lists it would actively harm Sonar
      # (each shard would instrument every package but only test its own subset,
      # producing per-shard profiles with 0% on out-of-shard packages that
      # would dilute the merged view). Each shard now reports only what it tested.
      #
      # No -race here — Linux race-detector coverage lives in the dedicated
      # test-race.yml workflow (kernel/, runtime/, pkg/, typeseval cache).
      # Supplemental Apple Silicon race coverage is in the os-smoke job below
      # (macOS leg, continue-on-error) — separate ownership: linux-shard
      # owns the strict gate, os-smoke owns cross-platform smoke.
      - name: Test
        run: go test -covermode=atomic -coverprofile=coverage-shard-${{ matrix.shard }}.out ${{ matrix.pkgs }} -count=1 -timeout 5m

      # Static governance gates (validate --strict, verify journey, check
      # contract-health, check unconditional-skip, examples internal-import
      # ban) are owned by the dedicated Governance Strict workflow
      # (.github/workflows/governance.yml → `make verify`). Running them
      # here would duplicate work and create two paths to update whenever a
      # gate is added. archtest layer/cell-internal guards are covered by
      # the dedicated tools shard (./tools/...) which runs in parallel with
      # this kernel shard, and are additionally re-run inside `make verify`
      # (cheap, < 30s).

      # Compile-verify e2e package even when integration-test job is skipped.
      # The e2e build tag gates runtime behaviour; this step ensures type/import
      # correctness is always checked on the kernel shard (static_checks gate).
      - name: Vet e2e package (compile verification)
        if: matrix.static_checks
        run: go vet -tags=e2e ./tests/e2e/...

      # Generated-artifact gate (PR-CFG-M follow-up):
      # assembly.yaml is the source-of-truth for runtime cell order, generated
      # entrypoint paths, boundary contracts, and assembly-reachable metrics
      # schemas. The verifier derives the expected artifact manifest from
      # metadata instead of trusting generator stdout to define the diff scope.
      - name: Verify generated artifacts are up-to-date
        if: matrix.static_checks
        run: go run ./cmd/gocell verify generated

      # NOTE: Kernel coverage gate re-runs `go test -cover ./kernel/...`
      # deliberately — it is not a duplicate of the Test step. The gate requires
      # in-package kernel coverage (each package's tests of itself), while the
      # kernel-shard Test step produces a merged profile that does not split
      # per-package. Running standalone avoids having to slice the profile.
      - name: Kernel coverage gate
        if: matrix.static_checks
        run: |
          go test -cover ./kernel/... 2>&1 | tee /tmp/kernel-cov.txt
          awk '
            /coverage: \[no statements\]/ { next }
            /outboxtest/ { next }
            /celltest/ { next }
            /commandtest/ { next }
            /coverage:/ {
              cov = $0
              sub(/^.*coverage: /, "", cov)
              sub(/% of statements.*$/, "", cov)
              if (cov == $0) {
                print "FAIL: could not parse coverage line: " $0;
                exit 1
              }
              if (cov + 0 < 90) {
                print "FAIL: " $2 " coverage " cov "% < 90%";
                exit 1
              }
            }
          ' /tmp/kernel-cov.txt
          echo "PASS: kernel coverage >= 90%"

      - name: Upload coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage-shard-${{ matrix.shard }}.out
          retention-days: 1

  integration-test:
    if: ${{ inputs.run-integration }}
    runs-on: ubuntu-latest
    # No `needs: build-test` — integration-test is independent (its own
    # checkout + go build inside `go test`). Running in parallel with
    # build-test cuts ~2 min of wall time. Cost: a CI minute wasted on
    # integration when unit tests break, which at current PR frequency is
    # a worthwhile trade.
    #
    # testcontainers manages containers dynamically (no static services)
    # to avoid port conflicts with host-bound services.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Integration tests (testcontainers)
        env:
          GOCELL_TEST_DOCKER_REQUIRED: "1"
        # cmd/corebundle contains e2e outbox integration tests (outbox_e2e_integration_test.go)
        # that require PG testcontainers. Include it so A11 + F1 regression guards run in CI.
        # examples/ssobff carries the end-to-end walkthrough test (AUTH-SETUP-01
        # regression guard — bootstrap credential flow, password-reset gate,
        # change-password / refresh / logout contract shape). Without this job
        # including it, the "integration" build tag was never compiled in CI.
        # cells/accesscore/slices/identitymanage also has an integration test
        # (changepassword_e2e_test.go) that exercises the real AuthMiddleware.
        # runtime/bootstrap carries lifecycle_integration_test.go (HookStartStop
        # ordering + LIFO rollback precision probes); without this path the
        # //go:build integration file silently never compiles in CI.
        # -coverpkg removed to match per-shard unit test profile semantics —
        # each run only reports coverage for the packages it tested, avoiding
        # per-file dilution in the merged Sonar view.
        # tests/e2e/internal/... covers the require+clients helpers (pure
        # unit tests); the smoke and encryption sub-packages are owned by
        # the dedicated `e2e` job which runs the docker-compose harness.
        # Earlier this scope used the broader ./tests/e2e/... — but
        # require.Docker only skips when no docker socket is reachable, and
        # GitHub runners always expose one for testcontainers, so smoke
        # tests under ./tests/e2e ran here and blocked on a corebundle
        # that never started in this job. Compile-time tag regressions
        # for the smoke / encryption packages remain covered by the e2e
        # job's `go test -tags=e2e ./tests/e2e/...`.
        # tests/testutil owns shared testcontainer startup helpers; include it
        # so new non-test helper code is covered by its own integration
        # contract tests instead of relying on downstream packages.
        run: go test -tags=integration,e2e -covermode=atomic -coverprofile=coverage-integration.out ./adapters/... ./tests/integration/... ./tests/testutil/... ./tests/e2e/internal/... ./cmd/corebundle/... ./examples/ssobff/... ./cells/accesscore/slices/identitymanage/... ./runtime/bootstrap/... -count=1 -timeout 15m

      - name: OTel collector smoke
        env:
          GOCELL_TEST_DOCKER_REQUIRED: "1"
        # Keep the PR/push gate focused on the single real OTLP/gRPC collector
        # round-trip. The nightly/manual workflow still runs the full package
        # under the same tags as a compatibility patrol.
        run: go test -tags=integration,otelcollector ./adapters/otel/... -run '^TestNewTracer_ExportsSpanToOTLPCollector$' -count=1 -timeout 10m

      - name: Upload integration coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-integration-profile
          path: coverage-integration.out
          retention-days: 1

  e2e:
    # PR-CFG-G1: real-execution gate for tests/e2e. Runs corebundle in a
    # 4-service docker-compose harness (postgres + redis + migrate + corebundle)
    # in real adapter + postgres cell mode, then pipes `go test -json` through
    # tools/e2egate. Fails the job when zero tests executed or any package
    # declared tests but had them all skipped.
    #
    # PR-CFG-G1 promotion from PR-CFG-J: harness now uses a real PG backend
    # (GOCELL_CELL_ADAPTER_MODE=postgres). accesscore and auditcore are wired
    # with real outbox writers via the shared PG pool (commits 1-3), so
    # DurabilityDurable mode works end-to-end and the 4 ConfigEncryption tests
    # are unskipped via GOCELL_E2E_PG_AVAILABLE=1.
    #
    # Independent of integration-test on purpose: testcontainers and
    # docker-compose are different infra strategies, and a failure in
    # either should not blame the other.
    if: ${{ inputs.run-integration }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # E2E_PG_PASSWORD is injected here (not committed in docker-compose.e2e.yaml
    # which uses ${E2E_PG_PASSWORD:?...} with no software fallback). Sonar's
    # Vulnerability blocker on hardcoded credentials is satisfied by externalizing
    # the value to this CI job env. Local devs use tests/e2e/.env.e2e.example.
    env:
      E2E_PG_PASSWORD: gocell-e2e-ci-pwd
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: Build e2egate
        run: go build -o "$RUNNER_TEMP/e2egate" ./tools/e2egate/cmd/e2egate
      - name: Start dependencies (postgres + redis)
        working-directory: tests/e2e
        run: docker compose -f docker-compose.e2e.yaml up -d --wait postgres redis
      - name: Run migrations to completion
        working-directory: tests/e2e
        # `up --wait` errors on one-shot services because they exit instead of
        # becoming healthy. Run migrate foreground via --exit-code-from so the
        # step status mirrors the migrator's exit code (0 ok, !=0 fails).
        run: docker compose -f docker-compose.e2e.yaml up --exit-code-from migrate migrate
      - name: Start corebundle
        working-directory: tests/e2e
        run: docker compose -f docker-compose.e2e.yaml up -d --wait corebundle
      - name: Bootstrap admin token
        run: |
          set -o pipefail
          bash tests/e2e/scripts/bootstrap-admin.sh >> "$GITHUB_ENV"
      - name: Run e2e tests with execution gate
        env:
          GOCELL_E2E_DOCKER_AVAILABLE: "1"
          # Real-PG harness: unskips the 4 TestE2E_ConfigEncryption_* tests
          # that require a live PG backend (guarded by e2erequire.PG).
          GOCELL_E2E_PG_AVAILABLE: "1"
          GOCELL_E2E_RMQ_AVAILABLE: "0"
        # No -coverprofile here: Go's coverage instruments only the test
        # process, but the SUT (corebundle) runs as a separate container
        # process — Go can't observe it. The integration-test job already
        # covers ./tests/e2e/... + corebundle code paths under -tags=
        # integration,e2e via testcontainers; adding a profile here would
        # only re-record the HTTP client lines and dilute Sonar's view.
        run: |
          set -o pipefail
          go test -tags=e2e -json -count=1 -timeout=120s ./tests/e2e/... \
            | tee "$RUNNER_TEMP/e2e.json" \
            | "$RUNNER_TEMP/e2egate"
      - name: Capture compose logs
        if: always()
        working-directory: tests/e2e
        run: |
          docker compose -f docker-compose.e2e.yaml logs --no-color > "$RUNNER_TEMP/compose.log" 2>&1 || true
          docker compose -f docker-compose.e2e.yaml logs migrate --no-color >> "$RUNNER_TEMP/compose.log" 2>&1 || true
      - name: Teardown
        if: always()
        working-directory: tests/e2e
        run: docker compose -f docker-compose.e2e.yaml down -v
      - name: Upload e2e diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics
          path: |
            ${{ runner.temp }}/e2e.json
            ${{ runner.temp }}/compose.log
          retention-days: 7

  os-smoke:
    if: ${{ inputs.run-os-smoke }}
    # Advisory status: job failure does NOT fail the overall workflow.
    # Rationale: the Windows/macOS unit subset is an OS-interop smoke check
    # whose failures have historically been runner-image-specific flakes
    # (SDDL alias emission, UTF-16 wrapper drift, freed-SID memory reuse) —
    # three distinct Windows-only fixes landed in the same day on this file
    # alone. Keeping the job as required would keep blocking unrelated PRs
    # on runner abstraction leaks. This mirrors the Go project's policy of
    # linux/amd64-as-hard-gate with windows/macos builders as advisory.
    # Failures remain visible on the PR checks UI; regressions are expected
    # to be investigated, not merged over silently.
    continue-on-error: true
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: Vet (cross-platform unit subset)
        run: go vet ./runtime/shutdown/... ./cells/accesscore/initialadmin/... ./runtime/config/... ./kernel/governance/...
        shell: bash

      - name: Cross-platform unit smoke
        # Note: -race requires CGO; available on macOS but not on bare windows-latest.
        # Enable -race on macOS to maximise race-detector coverage.
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            go test -race -count=1 -timeout 5m ./runtime/shutdown/... ./cells/accesscore/initialadmin/... ./runtime/config/... ./kernel/governance/...
          else
            go test -count=1 -timeout 5m ./runtime/shutdown/... ./cells/accesscore/initialadmin/... ./runtime/config/... ./kernel/governance/...
          fi
        shell: bash

  examples-smoke:
    # Boots examples/ssobff as a subprocess and asserts /readyz within 5s,
    # then triggers SIGTERM and verifies graceful shutdown. Regression guard
    # for the demo composition root (option wiring + lifecycle hook discovery
    # + dual-listener bind order) — walkthrough_test.go drives the cell chain
    # via httptest.NewServer and does NOT exercise main.go's bootstrap path.
    #
    # Parallel with build-test and integration-test — no `needs:` dependency.
    # The whole job (go build + ~5s ready probe + ~1s graceful shutdown) lands
    # under 1 min, so this guard adds zero wall-time to PR check fan-out.
    if: ${{ inputs.run-examples-smoke }}
    runs-on: ubuntu-latest
    steps:
      # No fetch-depth: 0 — this job does not run golangci-lint, so the
      # default shallow checkout is sufficient and faster. (build-test sets
      # fetch-depth: 0 only because golangci-lint --new-from-merge-base
      # needs `git merge-base`.)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: ssobff startup smoke
        # `examples_smoke` build tag isolates this from the `integration` tag
        # (whose tests assume DB/RMQ testcontainers and run in the slow
        # integration-test job). The dedicated tag also keeps `go test ./...`
        # without tags fast on developer laptops — subprocess smoke fires
        # only when explicitly requested.
        #
        # `-timeout 90s` bounds the test runtime once compilation finishes
        # (Go's `go test -timeout` does not constrain the build phase).
        # Test budget: ~5s readyz poll + ~5s SIGTERM wait + slack — 90s
        # leaves headroom for cold-cache `go build` slowdowns on shared
        # runners. `-count=1` is mandatory: without it `go test` may
        # return a cached PASS from a prior run with the same flags,
        # silently skipping the subprocess that the regression guard
        # exists to exercise.
        run: go test -tags=examples_smoke -count=1 -timeout 90s -run TestSSOBFFStartupSmoke ./examples/ssobff/...

  # Fork-PR guard: fork PRs cannot access org secrets (secrets.SONAR_TOKEN is
  # empty for forks), which would cause this job to fail with an opaque auth
  # error and block the PR with a red check. Guard: skip sonar when the PR head
  # repo differs from the base repo (i.e. fork PR). Fork PRs still receive full
  # build-test + integration-test coverage; they just lack SonarCloud
  # decoration/quality gate, which is acceptable — the quality gate fires again
  # post-merge on the push:develop run where the token is always available.
  sonarcloud:
    if: ${{ inputs.run-sonar && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    needs: [build-test, integration-test]
    # Depends on both build-test (unit coverage) and integration-test
    # (integration coverage) so SonarCloud receives the merged profile.
    # This ensures new code in DB-path branches (schema_guard, outbox_relay)
    # counts toward the coverage gate.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Downloads all per-shard unit coverage artifacts into the workspace
      # root (merge-multiple: true flattens shard-keyed directories). Each
      # artifact contains exactly one file `coverage-shard-<shard>.out`; names
      # do not collide because each shard's output path is unique.
      - name: Download unit coverage profiles (all shards)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-shard-*
          merge-multiple: true

      - name: Download integration coverage profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-integration-profile

      - name: Merge coverage profiles
        # All profiles use `-covermode=atomic` so the single header emitted
        # here is compatible with every shard + integration data block. We
        # strip every input file's first line (`mode: ...`) and prepend one
        # header. The list is deterministic (globbed at `set -u` time with
        # a known shard set) so partial glob expansion cannot silently drop
        # a shard.
        run: |
          set -euo pipefail
          echo "mode: atomic" > coverage-merged.out
          for f in coverage-shard-kernel.out coverage-shard-tools.out coverage-shard-runtime.out coverage-shard-cells.out coverage-shard-others.out coverage-integration.out; do
            if [ ! -f "$f" ]; then
              echo "FAIL: expected profile $f is missing" >&2
              exit 1
            fi
            tail -n +2 "$f" >> coverage-merged.out
          done
          echo "merged profile has $(wc -l < coverage-merged.out) lines from $(ls coverage-shard-*.out coverage-integration.out | wc -l) source profiles"

      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key // SHA-pinned action commit, not an API key
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
