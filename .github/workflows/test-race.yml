name: Test · Race Detector

# Independent race-detector entry point for **Linux** runners.
# Concurrency-sensitive packages (kernel/, runtime/, pkg/,
# tools/archtest/internal/typeseval/) are exercised with `-race` here; the
# main build-test (_build-lint.yml) no longer carries -race in its shard
# matrix.
#
# macOS supplemental race coverage lives in `_build-lint.yml` os-smoke job
# (curated subset of runtime/shutdown/, runtime/config/, kernel/governance/
# — continue-on-error advisory). It is
# kept separate because Apple Silicon scheduler can surface platform-
# specific race conditions, and the os-smoke job's continue-on-error
# disposition is unsuitable for the strict Linux gate.
#
# Scope rationale (Linux gate): cells/, adapters/, cmd/, tests/, contracts/
# run as race: false in build-test today (read-only static or integration
# packages without goroutine concurrency on the unit-test path). Mirroring
# the same scope here preserves race coverage without introducing a
# regression in coverage breadth.
#
# Lane split (PR #449 round-3):
#   - race-unit:           kernel/runtime/pkg/typeseval, no Docker, fast lane
#   - race-pg-integration: adapters/postgres + cells/accesscore PG repos with
#                          testcontainer; expensive lane, independent budget
#
# Independent jobs prevent cumulative timeout drift — a slow unit run cannot
# starve the PG integration step's budget. Mirrors Kubernetes' separation of
# unit and integration race lanes; etcd's unit/integration/e2e split.

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main, 'release/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  race-unit:
    name: go test -race (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Pin via go.mod for reproducibility — race-detector signal must be
          # stable across runs even if a 1.25.x patch lands at run time.
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go test -race
        # Concurrency-sensitive packages only:
        #   - kernel/ ... runtime/ ... pkg/ ... — repository's own goroutines
        #   - tools/archtest/internal/typeseval/ — process-wide SharedResolver
        #     cache (sync.Mutex + map) covered by TestSharedResolver_ConcurrentInit
        #   - adapters/prometheus/ — MetricProvider RWMutex + HookObserver
        #     concurrent OnHookEvent (B2-A-24 unit-level race coverage; no
        #     Docker dependency, fits the fast lane budget)
        run: |
          go test -race -count=1 -timeout 10m \
            ./kernel/... \
            ./runtime/... \
            ./pkg/... \
            ./adapters/prometheus/... \
            ./tools/archtest/internal/typeseval/...

  race-pg-integration:
    name: go test -race -tags=integration (postgres)
    runs-on: ubuntu-latest
    # PG testcontainer cold-start (~30-60s) + race-detector overhead (~1.5×) +
    # job-bookkeeping headroom. 20-minute job budget with 15-minute test
    # timeout leaves room for upload/cleanup if the test step times out.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # PR-V1-PG-STARTUP-HARDEN-FU-RACE-COVERAGE: race detection for the PG
      # adapter integration tests. Closes the gap where startup-hardening
      # store concurrency (txRunner ambient-tx + jti UNIQUE retries +
      # session.Store conformance fan-out) was previously only exercised
      # without -race. The integration build tag opts in the testcontainer
      # PG path; the runner image carries Docker so containers come up.
      - name: go test -race -tags=integration (postgres adapter + cell repos + L2 atomicity e2e)
        # Curated narrow scope — race-pg-integration is intentionally NOT a
        # discovery-based lane (unlike _build-lint.yml::integration-test).
        # The race detector adds ~3-5x runtime overhead, surfaces false
        # positives on long e2e walkthroughs, and only carries unique
        # signal for packages with concurrent goroutine boundaries:
        #
        #   - adapters/postgres/...                                   PG store ambient-tx + jti UNIQUE retries
        #   - cells/accesscore/internal/adapters/postgres/...         accesscore PG store conformance
        #   - tests/integration/l2atomicity/...                       producer→relay→publisher→subscriber goroutines
        #
        # Adding a non-PG / non-concurrent package here yields no race
        # signal at significant CI cost. Each addition is a deliberate
        # decision, not a discovery default.
        #
        # Governance: archtest CI-RACE-LANE-SUBSET-01 verifies every
        # package listed here is also discovered by
        # `go list -tags=integration` (preventing drift to non-integration
        # paths or typos). archtest CI-INTEGRATION-DISCOVERY-01 separately
        # guards _build-lint.yml::integration-test's discovery semantics.
        # The two workflows have distinct purposes (broad correctness vs
        # narrow race) and distinct invariants.
        #
        # ref: kubernetes/kubernetes — race detector in unit lanes only
        # ref: etcd test_unit / test_e2e split — race not on e2e
        # ref: watermill — pubsub tests skip -race, use ConsumerSpy
        env:
          # Ensures testutil.RequireDocker(t) calls t.Fatal (not t.Skip) when
          # Docker is unavailable, preventing silent skip in CI where Docker
          # is always expected. Mirrors _build-lint.yml::integration-test.
          GOCELL_TEST_DOCKER_REQUIRED: "1"
        run: |
          go test -race -count=1 -timeout 15m -tags=integration \
            ./adapters/postgres/... \
            ./cells/accesscore/internal/adapters/postgres/... \
            ./tests/integration/l2atomicity/...
