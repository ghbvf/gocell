name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          version: v2.11
          only-new-issues: true

      - name: Test
        run: go test -race -coverprofile=coverage.out -coverpkg=./... ./... -count=1 -timeout 5m

      - name: Validate metadata
        run: go run ./cmd/gocell validate

      - name: Check contract health
        run: go run ./cmd/gocell check contract-health

      # NOTE: Example metadata (cell.yaml/slice.yaml) lives under cells/ and contracts/,
      # not under examples/. The main `gocell validate` step above already covers them.

      - name: Check layering — examples no internal imports
        run: |
          if grep -rn "cells/.*/internal" examples/ 2>/dev/null; then
            echo "FAIL: examples/ imports cells/*/internal/"
            exit 1
          fi
          if grep -rn "adapters/.*/internal" examples/ 2>/dev/null; then
            echo "FAIL: examples/ imports adapters/*/internal/"
            exit 1
          fi
          echo "PASS: no internal import violations"

      # Kernel coverage gate: parse the coverage profile produced by Test above
      # instead of re-running `go test -cover ./kernel/...` (which took ~4s and
      # duplicated work already captured by -coverpkg=./...).
      - name: Kernel coverage gate
        run: |
          awk '
            NR == 1 { next }
            index($1, "github.com/ghbvf/gocell/kernel/") != 1 { next }
            index($1, "outboxtest") > 0 || index($1, "celltest") > 0 { next }
            {
              split($1, a, ":")
              file = a[1]
              n = split(file, parts, "/")
              pkg = parts[1]
              for (i = 2; i < n; i++) pkg = pkg "/" parts[i]
              total[pkg] += $2
              if ($3 > 0) covered[pkg] += $2
            }
            END {
              fail = 0
              for (pkg in total) {
                pct = (covered[pkg] * 100.0) / total[pkg]
                printf "%s: %.1f%%\n", pkg, pct
                if (pct < 90) {
                  printf "FAIL: %s coverage %.1f%% < 90%%\n", pkg, pct
                  fail = 1
                }
              }
              exit fail
            }
          ' coverage.out
          echo "PASS: kernel coverage >= 90%"

      - name: Upload coverage profile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 1

  sonarcloud:
    runs-on: ubuntu-latest
    needs: build-test
    # Split from build-test so the scan does not block integration-test or
    # other gates; build-test still produces the coverage profile this job
    # consumes via the coverage-profile artifact.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download coverage profile
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-profile

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .

  integration-test:
    runs-on: ubuntu-latest
    # No `needs: build-test` — integration-test is independent (its own
    # checkout + go build inside `go test`). Running in parallel with
    # build-test cuts ~2 min of wall time. Cost: a CI minute wasted on
    # integration when unit tests break, which at current PR frequency is
    # a worthwhile trade.
    #
    # testcontainers manages containers dynamically (no static services)
    # to avoid port conflicts with host-bound services.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Integration tests (testcontainers)
        run: go test -tags=integration ./adapters/... ./tests/integration/... -count=1 -timeout 10m
