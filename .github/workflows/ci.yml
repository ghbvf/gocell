name: CI

on:
  push:
    branches: [develop, "feat/**"]
  pull_request:
    branches: [develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache-dependency-path: src/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./... -count=1 -timeout 5m

      - name: Validate metadata
        run: go run ./cmd/gocell validate

      # NOTE: Example metadata (cell.yaml/slice.yaml) lives under src/cells/ and src/contracts/,
      # not under examples/. The main `gocell validate` step above already covers them.

      - name: Check layering — examples no internal imports
        run: |
          if grep -rn "cells/.*/internal" examples/ 2>/dev/null; then
            echo "FAIL: examples/ imports cells/*/internal/"
            exit 1
          fi
          if grep -rn "adapters/.*/internal" examples/ 2>/dev/null; then
            echo "FAIL: examples/ imports adapters/*/internal/"
            exit 1
          fi
          echo "PASS: no internal import violations"

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: src

      - name: Kernel coverage gate
        run: |
          go test -cover ./kernel/... 2>&1 | tee /tmp/kernel-cov.txt
          awk '/coverage:/ {
            split($NF, a, "%");
            if (a[1]+0 < 90) {
              print "FAIL: " $1 " coverage " $NF " < 90%";
              exit 1
            }
          }' /tmp/kernel-cov.txt
          echo "PASS: kernel coverage >= 90%"

  integration-test:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: src
    # No static services: testcontainers manages containers dynamically,
    # avoiding port conflicts with host-bound services.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache-dependency-path: src/go.sum

      - name: Integration tests (testcontainers)
        run: go test -tags=integration ./adapters/... -count=1 -timeout 5m
