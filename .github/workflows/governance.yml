name: Governance Strict

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    branches: [develop, main, 'release/**']

# Governance Strict is the K8s-style `make verify` runner — it discovers and
# executes every hack/verify-*.sh gate in deterministic order, accumulating
# failures. Adding a new gate is a single new file under hack/; this workflow
# never needs to change.
# ref: kubernetes/kubernetes hack/make-rules/verify.sh

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    # `make verify` runs ~9 gates including a small Go test set; real wall
    # time is ~1 min on a warm runner. 5 min matches the smallest project
    # timeout (security-vuln.yml's govulncheck) and gives ~5x cushion for
    # cold Go module cache or runner contention.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: make verify
        # VERIFY_SKIP=archtest,gofumpt: each entry below is owned by another
        # CI shard and re-running it here is pure duplicate work; local
        # `make verify` (no env) keeps the full gate set so developers still
        # get one-command coverage.
        #
        #   archtest — executed by _build-lint.yml's build-test (tools) shard
        #     on the same PR/push (`go test ./tools/...` without -race;
        #     archtest itself runs without -race in both entry points —
        #     see hack/verify-archtest.sh).
        #   gofumpt  — executed by _build-lint.yml's `golangci-lint run` step
        #     (.golangci.yml formatters.enable: gofumpt). The kernel shard
        #     runs the full-repo lint with v2.11.4 + verify; this governance
        #     job does not install golangci-lint, so verify-gofumpt.sh would
        #     otherwise fail with `command not found`.
        env:
          VERIFY_SKIP: archtest,gofumpt
        run: make verify
