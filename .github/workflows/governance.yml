name: Governance Strict

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    branches: [develop, main, 'release/**']

# Governance Strict is the K8s-style `make verify` runner — it discovers and
# executes every hack/verify-*.sh gate in deterministic order, accumulating
# failures. Adding a new gate is a single new file under hack/; this workflow
# never needs to change.
# ref: kubernetes/kubernetes hack/make-rules/verify.sh

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    # `make verify` discovers and runs every hack/verify-*.sh gate. After the
    # archtest sharding rewrite (ADR 202605120000), verify-archtest.sh runs
    # 16 process-isolated Go test invocations serially within this job;
    # observed wall ~45s on macOS/local, expected ~2-3m on GHA warm cache.
    # 20 min covers worst-case cold module cache (no Pre-download step in
    # this serial path), plus the other ~9 verify-*.sh gates running
    # continue-on-failure (hack/make-rules/verify.sh accumulates failures).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: make verify
        # No VERIFY_SKIP: hack/verify-archtest.sh is now process-isolated
        # (16 serial shards, each its own Go process — heap freed between
        # shards). It is no longer the source of OOM that justified skipping
        # it here pre-ADR 202605120000. Running it via make verify on every
        # push/PR is the unified governance entry; the parallel
        # verify-archtest matrix in _build-lint.yml is the fast-feedback
        # entry on PRs (~2 min wall via 16-way parallelism).
        #
        # gofumpt: hack/verify-gofumpt.sh bootstraps golangci-lint at the
        # pinned version via hack/lib/golangci-lint.sh (one-time go install
        # on a cold setup-go cache). The CI lint shard in _build-lint.yml
        # uses golangci-lint-action for its build cache and `config verify`;
        # both consumers share GOLANGCI_LINT_VERSION = v2.11.4.
        run: make verify
