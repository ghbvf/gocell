lifecycle: experimental
owner:
  team: platform
  role: journey-owner
cells:
  - accesscore
  - auditcore
contracts:
  - event.session.created.v1
passCriteria:
  - text: session.created 事件被 auditcore 消费
    mode: auto
    checkRef: journey.J-auditlogintrail.event-consume
