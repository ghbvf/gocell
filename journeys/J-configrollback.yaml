id: J-configrollback
goal: 配置版本回滚后所有订阅 cell 回退生效，审计记录完整
owner:
  team: platform
  role: journey-owner
cells:
  - configcore
  - accesscore
  - auditcore
contracts:
  - event.config.rollback.v1
passCriteria:
  - text: 配置回滚到指定版本
    mode: auto
    checkRef: journey.J-configrollback.version-revert
  - text: config.rollback 事件发布成功
    mode: auto
    checkRef: journey.J-configrollback.event-publish
  - text: 所有订阅 cell 应用回滚配置
    mode: auto
    checkRef: journey.J-configrollback.cell-apply
  - text: 审计记录回滚操作
    mode: auto
    checkRef: journey.J-configrollback.audit-record
