id: J-useronboarding
goal: 新用户完成创建并具备登录能力
lifecycle: experimental
owner:
  team: platform
  role: journey-owner
cells:
  - accesscore
contracts:
  # User identity CRUD + role mgmt + lifecycle events. Journey-level closure
  # for JOURNEY-CONTRACT-EXISTENCE-01 — every active user/role contract
  # belongs here unless a future J-rbac journey splits them out.
  - event.user.created.v1
  - event.user.updated.v1
  - event.user.deleted.v1
  - event.role.assigned.v1
  - event.role.revoked.v1
  - http.auth.user.create.v1
  - http.auth.user.get.v1
  - http.auth.user.update.v1
  - http.auth.user.patch.v1
  - http.auth.user.delete.v1
  - http.auth.role.assign.v1
  - http.auth.role.revoke.v1
  - http.auth.role.check.v1
  - http.auth.role.list.v1
passCriteria:
  - text: 用户记录创建成功
    mode: auto
    checkRef: journey.J-useronboarding.user-create
  - text: 默认角色分配完成
    mode: auto
    checkRef: journey.J-useronboarding.role-assign
  - text: user.created 事件发布成功
    mode: auto
    checkRef: journey.J-useronboarding.event-publish
  - text: 新用户可成功登录
    mode: auto
    checkRef: journey.J-useronboarding.login-verify
