id: http.order.ping.v1
kind: http
ownerCell: testcell
consistencyLevel: L1
lifecycle: active
endpoints:
  server: testcell
  http:
    method: POST
    path: /api/v1/ping/
    successStatus: 201
    noContent: false
    responses:
      400:
        description: Bad Request
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      500:
        description: Internal Server Error
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
codegen: true
