id: http.config.delete.v1
kind: http
ownerCell: configcell
consistencyLevel: L1
lifecycle: active
endpoints:
  server: configcell
  http:
    method: DELETE
    path: /api/v1/config/{key}
    pathParams:
      key:
        type: string
        minLength: 1
        maxLength: 128
    successStatus: 204
    noContent: true
    responses:
      400:
        description: Bad Request
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: Not Found
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
codegen: true
