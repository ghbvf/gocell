id: http.auth.session.delete.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: DELETE
    path: /api/v1/access/sessions/{id}
    pathParams:
      id:
        type: string
        format: uuid
    successStatus: 204
    noContent: true
    auth:
      serviceOwned: true
      passwordResetExempt: true
      responses:
        - 503
    responses:
      400:
        description: "Bad request"
        schemaRef: "error-response-v1.schema.json"
      401:
        description: "Unauthorized"
        schemaRef: "error-response-v1.schema.json"
      404:
        description: "Not found — session id not found, or owned by another user (IDOR-safe collapse)"
        schemaRef: "error-response-v1.schema.json"
    ownership:
      subjectPath: ctx.subjectID
      resourcePath: path.id.userID
