id: configpublish
belongsToCell: configcore
consistencyLevel: L2
contractUsages:
  - contract: http.config.publish.v1
    role: serve
  - contract: http.config.rollback.v1
    role: serve
  - contract: event.config.entry-upserted.v1
    role: publish
  - contract: event.config.version-published.v1
    role: publish
  - contract: event.config.rollback.v1
    role: publish
verify:
  unit:
    - unit.configpublish.service
  contract:
    - contract.http.config.publish.v1.serve
    - contract.http.config.rollback.v1.serve
    - contract.event.config.entry-upserted.v1.publish
    - contract.event.config.version-published.v1.publish
    - contract.event.config.rollback.v1.publish
  waivers: []

allowedFiles:
  - cells/configcore/slices/configpublish/**
