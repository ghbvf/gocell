id: identity-manage
belongsToCell: access-core
contractUsages:
  - contract: event.user.created.v1
    role: publish
  - contract: event.user.locked.v1
    role: publish
  - contract: http.auth.user.create.v1
    role: serve
  - contract: http.auth.user.get.v1
    role: serve
  - contract: http.auth.user.update.v1
    role: serve
  - contract: http.auth.user.patch.v1
    role: serve
  - contract: http.auth.user.delete.v1
    role: serve
  - contract: http.auth.user.lock.v1
    role: serve
  - contract: http.auth.user.unlock.v1
    role: serve
  - contract: http.auth.user.change-password.v1
    role: serve
verify:
  unit:
    - unit.identity-manage.service
  contract:
    - contract.event.user.created.v1.publish
    - contract.event.user.locked.v1.publish
    - contract.http.auth.user.create.v1.serve
    - contract.http.auth.user.get.v1.serve
    - contract.http.auth.user.update.v1.serve
    - contract.http.auth.user.patch.v1.serve
    - contract.http.auth.user.delete.v1.serve
    - contract.http.auth.user.lock.v1.serve
    - contract.http.auth.user.unlock.v1.serve
    - contract.http.auth.user.change-password.v1.serve
  waivers: []

allowedFiles:
  - cells/access-core/slices/identity-manage/**
  - cells/access-core/slices/identitymanage/**
