sonar.projectKey=ghbvf_gocell
sonar.organization=ghbvf
sonar.projectName=gocell

sonar.sources=kernel,runtime,adapters,cells,cmd,pkg,examples,tests,gocell.go
sonar.tests=kernel,runtime,adapters,cells,cmd,pkg,examples,tests,gocell_test.go
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage-merged.out

# --- Coverage exclusions ---
#
# outboxtest is a conformance-suite helper package (like go-test's
# testing/iotest) executed by adapter integration tests (RabbitMQ, in-memory
# bus) under -tags=integration. The default build-test job only exercises it
# via fakePubSub shims (see kernel/outbox/outboxtest/helpers_test.go), so
# in-package line coverage does not reflect the package's real exercise
# surface. The kernel coverage gate in .github/workflows/ci.yml already
# skips outboxtest/celltest with the same rationale; mirror that here to
# keep SonarCloud's new-code metric honest.
# Cross-platform stubs and Windows-only code are excluded from Sonar coverage:
# - *_windows.go files compile only on Windows, where the os-smoke matrix runs
#   them but does not feed coverage into Sonar (Linux is the Sonar baseline).
# - *_unsupported.go files are stubs for !unix && !windows (or
#   !linux && !darwin && !windows) targets that no GitHub runner exercises.
#   Including them in the coverage denominator would make the new-code
#   coverage gate impossible to satisfy.
# - platform_supported.go is a one-line `return nil` whose only call site
#   (cells/accesscore/cell_init.go::Init) is exercised by the unix tests, but
#   Sonar's go cover ingestion does not count single-statement function
#   bodies toward coverage. It pairs with platform_unsupported.go (excluded
#   above for build-tag reasons), so excluding both keeps the V-A15 platform
#   guard pair symmetric in the coverage report.
sonar.coverage.exclusions=\
  **/kernel/outbox/outboxtest/**,\
  **/kernel/cell/celltest/**,\
  **/runtime/auth/refresh/storetest/**,\
  **/examples/**,\
  **/cells/accesscore/initialadmin/credfile_security_windows.go,\
  **/cells/accesscore/initialadmin/path_default_windows.go,\
  **/cells/accesscore/initialadmin/path_default_unsupported.go,\
  **/cells/accesscore/initialadmin/bootstrap_unsupported.go,\
  **/cells/accesscore/initialadmin/credfile_unsupported.go,\
  **/cells/accesscore/initialadmin/sweep_unsupported.go,\
  **/cells/accesscore/initialadmin/lifecycle_unsupported.go,\
  **/cells/accesscore/initialadmin/platform_supported.go,\
  **/cells/accesscore/initialadmin/platform_unsupported.go,\
  **/runtime/shutdown/signals_windows.go,\
  **/runtime/shutdown/signals_other.go

# --- Rule exclusions for Go conventions ---

# go:S100  — Go test naming convention uses underscores: TestXxx_Yyy_Zzz
# go:S2068 — Test files use "password" / DSN as test data, not real credentials
# go:S5659 — Tests use HMAC to sign JWTs for speed; production uses RS256
# go:S117  — Go naming allows abbreviations like dbURL, httpReq
# go:S1192 — Table-driven tests intentionally repeat string literals for readability
# go:S1186 — Empty func(){} in test tables are idiomatic Go noop handlers
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13

sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e2.ruleKey=go:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e3.ruleKey=go:S5659
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e4.ruleKey=go:S117
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e5.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e6.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*_test.go

# plsql:VarcharUsageCheck — false positive, no PL/SQL in this Go project
sonar.issue.ignore.multicriteria.e7.ruleKey=plsql:VarcharUsageCheck
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.sql

# go:S2068 — docker-compose files in examples/ use dev-only passwords
sonar.issue.ignore.multicriteria.e8.ruleKey=go:S2068
sonar.issue.ignore.multicriteria.e8.resourceKey=**/examples/**

# go:S1313 — Test files use hardcoded IPs (RFC 5737/3849 documentation ranges)
#            as test fixtures for proxy trust, CIDR matching, XFF parsing, etc.
sonar.issue.ignore.multicriteria.e9.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*_test.go

# go:S1186 — kernel/cell/auth_plan.go sealed interface marker methods are
#            empty by design: each `func (T) listenerAuthOK() {}` is the
#            unexported seal that closes the ListenerAuth enumeration so
#            external packages cannot implement it. The body never runs;
#            godoc above every marker explains the seal pattern. Same idiom
#            as kubernetes/apiserver pkg/authentication/authenticator/interfaces.go.
sonar.issue.ignore.multicriteria.e10.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.e10.resourceKey=**/kernel/cell/auth_plan.go

# go:S1186 — cells/accesscore/initialadmin/lifecycle_unsupported.go With* /
#            Bind stubs are intentionally empty no-ops on !unix && !windows
#            builds. The whole file is reachable only when
#            WithInitialAdminBootstrap is configured for an unsupported GOOS,
#            and PlatformSupported() / cell.Init returns
#            ErrCellPlatformUnsupported before any of these options is
#            invoked. File-level godoc explains the seal pattern; per-line
#            nested comments would 8x duplicate that for zero new context.
#            Same justification model as e10 (auth_plan.go sealed markers).
sonar.issue.ignore.multicriteria.e11.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.e11.resourceKey=**/cells/accesscore/initialadmin/lifecycle_unsupported.go

# docker:S6470 — tests/e2e/Dockerfile.* must `COPY . .` to feed `go build` the
#                full module (go.mod + tools/pg-migrate + cmd/corebundle + all
#                transitive imports). The repo-root .dockerignore narrows the
#                context (.git, .claude, docs/, worktrees/, bak/, *.env,
#                coverage*.out filtered), and the multi-stage build discards
#                the build-stage filesystem so only the compiled binary
#                crosses into the runtime image. Privileged-user concerns
#                (S6471) are addressed at the file level via `USER gocell`.
sonar.issue.ignore.multicriteria.e12.ruleKey=docker:S6470
sonar.issue.ignore.multicriteria.e12.resourceKey=**/tests/e2e/Dockerfile.*

# go:S1130 — Hexagonal port interfaces under cells/*/internal/ports/ are named
#            after their domain role (e.g. SessionRepository, UserRepository,
#            FlagRepository, ConfigRepository, ConfigClient), not the stdlib
#            single-method `-er` convention (Reader, Closer). The `-er` rule
#            is for stdlib utility interfaces; domain ports follow the
#            hexagonal/clean-architecture convention used throughout this
#            repo (every existing port at cells/*/internal/ports/*.go uses
#            the noun-based name). Renaming would break repo-wide consistency
#            and cascade through option names (WithConfigClient,
#            WithConfigClientHTTP) that lock the noun in.
sonar.issue.ignore.multicriteria.e13.ruleKey=go:S1130
sonar.issue.ignore.multicriteria.e13.resourceKey=**/cells/*/internal/ports/*.go
