sonar.projectKey=ghbvf_gocell
sonar.organization=ghbvf
sonar.projectName=gocell

sonar.sources=kernel,runtime,adapters,cells,cmd,pkg,examples,tests,gocell.go
sonar.tests=kernel,runtime,adapters,cells,cmd,pkg,examples,tests,gocell_test.go
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage-merged.out

# --- Coverage exclusions ---
#
# outboxtest is a conformance-suite helper package (like go-test's
# testing/iotest) executed by adapter integration tests (RabbitMQ, in-memory
# bus) under -tags=integration. The default build-test job only exercises it
# via fakePubSub shims (see kernel/outbox/outboxtest/helpers_test.go), so
# in-package line coverage does not reflect the package's real exercise
# surface. The kernel coverage gate in .github/workflows/ci.yml already
# skips outboxtest/celltest with the same rationale; mirror that here to
# keep SonarCloud's new-code metric honest.
sonar.coverage.exclusions=**/kernel/outbox/outboxtest/**,**/kernel/cell/celltest/**,**/examples/**

# --- Rule exclusions for Go conventions ---

# go:S100  — Go test naming convention uses underscores: TestXxx_Yyy_Zzz
# go:S2068 — Test files use "password" / DSN as test data, not real credentials
# go:S5659 — Tests use HMAC to sign JWTs for speed; production uses RS256
# go:S117  — Go naming allows abbreviations like dbURL, httpReq
# go:S1192 — Table-driven tests intentionally repeat string literals for readability
# go:S1186 — Empty func(){} in test tables are idiomatic Go noop handlers
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9

sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e2.ruleKey=go:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e3.ruleKey=go:S5659
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e4.ruleKey=go:S117
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e5.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.e6.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*_test.go

# plsql:VarcharUsageCheck — false positive, no PL/SQL in this Go project
sonar.issue.ignore.multicriteria.e7.ruleKey=plsql:VarcharUsageCheck
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.sql

# go:S2068 — docker-compose files in examples/ use dev-only passwords
sonar.issue.ignore.multicriteria.e8.ruleKey=go:S2068
sonar.issue.ignore.multicriteria.e8.resourceKey=**/examples/**

# go:S1313 — Test files use hardcoded IPs (RFC 5737/3849 documentation ranges)
#            as test fixtures for proxy trust, CIDR matching, XFF parsing, etc.
sonar.issue.ignore.multicriteria.e9.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*_test.go
