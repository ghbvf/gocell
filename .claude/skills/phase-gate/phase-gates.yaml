# Phase Gate 准入准出规则声明（唯一可执行合同）
# 消费者: .claude/skills/phase-gate/scripts/phase-gate-check.py
# 规则: 每阶段 entry/exit 均为硬性条件，FAIL 则阻塞
# 跳过: phase-charter.md 中声明 N/A:<SCOPE_IRRELEVANT|RESOURCE_UNAVAILABLE|DEFERRED> <filename>
#
# 检查类型:
#   required_files  — specs/{branch}/ 下的文件（存在且非空）
#   repo_files      — repo root 下的文件（存在且非空）
#   content_checks  — specs/{branch}/ 下文件的内容 pattern 或 special check
#   command_checks  — 执行命令，检查退出码为 0

stages:
  S0:
    entry: {}
    exit:
      required_files:
        - phase-charter.md
        - role-roster.md
        - product-context.md
      content_checks:
        - file: phase-charter.md
          pattern: "(目标|范围|非目标)"
        - file: role-roster.md
          pattern: "(ON|OFF)"

  S1:
    entry:
      required_files:
        - phase-charter.md
        - role-roster.md
        - product-context.md
    exit:
      required_files:
        - spec.md
        - checklists/requirements.md
      content_checks:
        - file: spec.md
          pattern: "(文档|DevOps|测试|contract test|journey test)"

  S2:
    entry:
      required_files:
        - spec.md
    exit:
      required_files:
        - kernel-constraints.md
        - review-architect.md
        - review-roadmap.md
        - review-product-manager.md
      content_checks:
        - file: kernel-constraints.md
          pattern: "(集成风险|分层隔离|核心约束|元数据合规|契约完整性)"

  S3:
    entry:
      required_files:
        - kernel-constraints.md
        - review-architect.md
        - review-roadmap.md
        - review-product-manager.md
    exit:
      required_files:
        - decisions.md
      content_checks:
        - file: decisions.md
          pattern: "(采纳|拒绝|延迟|accept|reject|defer)"

  S4:
    entry:
      required_files:
        - decisions.md
    exit:
      required_files:
        - plan.md
        - tasks.md
        - product-acceptance-criteria.md
        - research.md
        - pr-plan.md
      content_checks:
        - file: tasks.md
          pattern: "(contract test|journey test|测试编写|E2E)"
        - file: tasks.md
          pattern: "(cell.yaml|slice.yaml|gocell validate|元数据)"
        - file: tasks.md
          pattern: "(文档|godoc|README)"
        - file: product-acceptance-criteria.md
          pattern: "(P1|P2|P3)"

  S5:
    entry:
      required_files:
        - tasks.md
        - product-acceptance-criteria.md
    exit:
      required_files:
        - tasks.md
        - pr-plan.md
      content_checks:
        - file: tasks.md
          check: no_unchecked_tasks
        - file: pr-plan.md
          pattern: "merged"
      command_checks:
        - args: ["go", "build", "./..."]
          cwd: src
          desc: "go build 编译通过"
        - args: ["go", "vet", "./..."]
          cwd: src
          desc: "go vet 静态检查通过"
        - args: ["go", "test", "./...", "-count=1"]
          cwd: src
          desc: "go test 全量测试通过"

  S6:
    entry:
      required_files:
        - tasks.md
    exit:
      required_files:
        - review-findings.md
        - tech-debt.md
      content_checks:
        - file: review-findings.md
          pattern: "(P0|P1|P2)"
        - file: tech-debt.md
          pattern: "(TECH|PRODUCT)"

  S7:
    entry:
      required_files:
        - review-findings.md
        - tech-debt.md
    exit:
      required_files:
        - qa-report.md
        - user-signoff.md
        - evidence/go-test/result.txt
        - evidence/validate/result.txt
        - evidence/journey/result.txt
      content_checks:
        - file: qa-report.md
          pattern: "(go test.*PASS|coverage|全量测试通过)"
        - file: user-signoff.md
          pattern: "(APPROVE|CONDITIONAL|REJECT)"
        - file: evidence/go-test/result.txt
          pattern: "(PASS|ok)"
        - file: evidence/validate/result.txt
          pattern: "(0 errors|PASS|valid)"
      command_checks:
        - args: ["go", "test", "./...", "-count=1"]
          cwd: src
          desc: "go test 全量测试通过"

  S8:
    entry:
      required_files:
        - qa-report.md
        - tech-debt.md
        - user-signoff.md
        - evidence/go-test/result.txt
        - evidence/validate/result.txt
        - evidence/journey/result.txt
      content_checks:
        - file: user-signoff.md
          pattern: "(APPROVE|CONDITIONAL)"
    exit:
      required_files:
        - kernel-review-report.md
        - product-review-report.md
        - phase-report.md
      repo_files:
        - CHANGELOG.md
      content_checks:
        - file: kernel-review-report.md
          pattern: "(绿|黄|红|GREEN|YELLOW|RED)"
        - file: product-review-report.md
          pattern: "(绿|黄|红|GREEN|YELLOW|RED)"
        - file: phase-report.md
          pattern: "(变更摘要|关键决策)"
