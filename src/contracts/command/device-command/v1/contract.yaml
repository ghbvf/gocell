id: command.device-command.v1
kind: command
ownerCell: device-cell
consistencyLevel: L4
lifecycle: active
endpoints:
  handler: device-cell
  invokers: []
schemaRefs:
  request: request.schema.json
  response: response.schema.json
description: >
  L4 command primitive: commands are enqueued by the server and polled by
  devices on their own schedule. The device acknowledges execution via an
  ack endpoint. Framework-level kernel/command first-class support is
  planned for v1.1.
