id: http.order.get.v1
kind: http
ownerCell: ordercell
consistencyLevel: L2
lifecycle: active
codegen: true
endpoints:
  server: ordercell
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/orders/{id}
    pathParams:
      id:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
