id: http.device.status.v1
kind: http
ownerCell: devicecell
consistencyLevel: L4
lifecycle: active
endpoints:
  server: devicecell
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/devices/{id}/status
    pathParams:
      id:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — path parameter id is too short or too long"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
