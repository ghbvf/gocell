id: http.device.command.extend-lease.v1
kind: http
ownerCell: devicecell
consistencyLevel: L4
lifecycle: active
endpoints:
  server: devicecell
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/devices/{id}/commands/{cmdId}/extend-lease
    pathParams:
      id:
        type: string
      cmdId:
        type: string
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — malformed JSON body or oversized payload"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
