id: http.device.command.report.v1
kind: http
ownerCell: devicecell
consistencyLevel: L4
lifecycle: active
endpoints:
  server: devicecell
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/devices/{id}/commands/{cmdId}/report
    pathParams:
      id:
        type: string
        minLength: 1
        maxLength: 256
      cmdId:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — path parameter id or cmdId is too short or too long"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Request body too large"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
