id: http.device.command.dequeue.v1
kind: http
ownerCell: devicecell
consistencyLevel: L4
lifecycle: active
codegen: true
endpoints:
  server: devicecell
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/devices/{id}/commands
    pathParams:
      id:
        type: string
        minLength: 1
        maxLength: 256
    queryParams:
      cursor:
        type: string
        required: false
        minLength: 0
        maxLength: 4096
      limit:
        type: integer
        required: false
        minimum: 1
        maximum: 500
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
