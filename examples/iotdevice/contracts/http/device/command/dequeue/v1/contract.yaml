id: http.device.command.dequeue.v1
kind: http
ownerCell: devicecell
consistencyLevel: L4
lifecycle: active
endpoints:
  server: devicecell
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/devices/{id}/commands
    pathParams:
      id:
        type: string
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
