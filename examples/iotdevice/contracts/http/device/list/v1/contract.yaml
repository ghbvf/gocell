id: http.device.list.v1
kind: http
ownerCell: devicecell
consistencyLevel: L0
lifecycle: active
codegen: true
endpoints:
  server: devicecell
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/devices/
    queryParams:
      cursor:
        type: string
        required: false
        minLength: 0
        maxLength: 4096
      limit:
        type: integer
        required: false
        minimum: 1
        maximum: 500
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter or cursor"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
