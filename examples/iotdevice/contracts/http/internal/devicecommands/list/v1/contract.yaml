id: http.internal.devicecommands.list.v1
kind: http
ownerCell: devicecell
consistencyLevel: L4
lifecycle: active
endpoints:
  server: devicecell
  # devicecell self-call: an internal worker on the same cell invokes this
  # endpoint via InternalListener for periodic scan-active operations. See
  # examples/iotdevice/cells/devicecell/slices/devicecommand/handler.go for
  # rationale; cross-cell consumers should declare themselves here when wired.
  clients:
    - devicecell
  http:
    method: GET
    path: /internal/v1/devicecommands
    queryParams:
      cursor:
        type: string
        required: false
        minLength: 0
        maxLength: 4096
      deviceId:
        type: string
        required: false
        minLength: 0
        maxLength: 256
      limit:
        type: integer
        required: false
        minimum: 1
        maximum: 500
      statuses:
        type: string
        required: false
        minLength: 0
        maxLength: 256
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
