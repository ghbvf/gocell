version: "2"

linters:
  # Default-enabled: govet, errcheck, staticcheck, unused, ineffassign.
  # gosimple is part of staticcheck in v2.
  enable:
    # 复杂度（互补：gocognit=认知, cyclop=圈）
    - gocognit
    - cyclop
    # nil 安全
    - nilerr
    - nilnesserr
    - nilnil
    # 代码质量
    - gocritic
    - unparam
    - unconvert
    - dupl
    # 安全
    - gosec
    # 拼写 / 格式
    - misspell
    - godot
    - whitespace
    - lll
    # 函数体量
    - funlen
    # 依赖管控
    - gomodguard
    - depguard
    # 禁止使用特定函数/包（observability 规范）
    - forbidigo
    # 代码风格（dot-imports 等）
    - revive
    # nolint 治理：所有 //nolint:... 必须带 // <reason>，且必须指明 linter 名
    - nolintlint
    # %w wrap 漂移 / sentinel == 比较 / 类型断言（Go 1.20+ multi-%w 默认支持）
    - errorlint
    # HTTP response body 泄漏
    - bodyclose
    # time.Duration 量纲错乘
    - durationcheck

  settings:
    gocognit:
      min-complexity: 15

    cyclop:
      max-complexity: 15
      package-average: 0

    nilnil:
      only-two: false

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - ifElseChain      # 风格争议（else if 可读性）
        - hugeParam        # GoCell Context/Options 大结构体传参合理
        - rangeValCopy     # Go 1.22+ range 语义已优化
        - exitAfterDefer   # main / cmd 下 os.Exit 前 defer 是设计

    lll:
      line-length: 140

    funlen:
      lines: 80
      statements: 50

    dupl:
      threshold: 150

    errcheck:
      exclude-functions:
        # hash.Hash.Write per the io.Writer contract (and the stdlib package
        # doc) always returns (len(b), nil). Calling it as `h.Write(b)`
        # without binding the return is the stdlib-documented hmac idiom
        # (see crypto/hmac godoc Example). The error in the signature is
        # there only because hash.Hash satisfies io.Writer.
        - "(hash.Hash).Write"

    gosec:
      config:
        G101:
          pattern: "(?i)passwd|pass|password|pwd|secret|token|apikey"
          ignore_entropy: "false"
          entropy_threshold: "80.0"
          per_char_threshold: "3.0"
          truncate: "32"

    misspell:
      # US locale: behaviour→behavior, cancelled→canceled, colour→color, etc.
      # Project codebase + comments use US English; misspell flags British
      # variants as errors (no auto-fix unless `golangci-lint run --fix` invoked).
      locale: US

    godot:
      scope: declarations
      exclude:
        - "^\\s*\\[.*\\]"
        - "^\\s*-"
        - ":$"

    whitespace:
      multi-func: false  # multi-line signature 后空行检查过严，关闭（默认仅检查函数体首尾空行）

    nolintlint:
      # //nolint not actually suppressing anything must be removed (catches
      # stale nolints after the underlying issue is fixed).
      allow-unused: false
      # Empty array means: every linter requires an explanation. No carve-outs.
      allow-no-explanation: []
      # //nolint:<linter> // <reason> — nolintlint enforces the linter name
      # and the presence of an explanation. It cannot enforce a particular
      # prefix in that explanation. Convention (reviewer-enforced, not
      # tool-enforced): write "R2-approved: <reason>" so future grep can
      # find the historical decision; reviewers reject nolints without
      # the prefix during PR review.
      require-explanation: true
      require-specific: true

    depguard:
      # Architecturally equivalent to archtest's former LAYER-01..04 allow-list
      # semantics: each layer has list-mode: strict + an explicit allow list.
      # Anything not allowed (including unmodeled future top-level dirs) is
      # rejected. New external dependencies require a one-line YAML update —
      # this is intentional friction so dependency growth is a conscious
      # architectural decision.
      # File globs use `**/<layer>/**` form because depguard matches against
      # absolute paths via gobwas/glob (no root anchor). The leading `**`
      # consumes whatever module-root prefix golangci-lint is invoked from
      # (CI checkout dir, $TMPDIR for fixture tests, etc.). Cell-internal
      # adapter packages live at `**/cells/**/adapters/**` and must be
      # excluded from `adapters-isolation` — they are governed by
      # `cells-isolation` instead.
      rules:
        kernel-isolation:
          # LAYER-01: kernel/ depends only on stdlib + pkg/ + gopkg.in/yaml.v3.
          list-mode: strict
          files:
            - "**/kernel/**"
            - "!**/kernel/**/*_test.go"
            - "!**/examples/**"  # examples are unrestricted (CLAUDE.md)
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - gopkg.in/yaml.v3
        pkg-isolation:
          # pkg/ is foundational: stdlib + a minimal external surface. Must not
          # depend on kernel/runtime/cells/adapters/cmd/examples/tests/tools to
          # avoid import cycles (kernel and runtime depend on pkg).
          list-mode: strict
          files:
            - "**/pkg/**"
            - "!**/pkg/**/*_test.go"
            - "!**/examples/**"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/pkg
            - github.com/google/uuid
            - github.com/santhosh-tekuri/jsonschema
            - gopkg.in/yaml.v3
        runtime-isolation:
          # LAYER-03: runtime/ depends on kernel/ + pkg/ + curated externals.
          # storetest/ test-helper packages (non-_test.go) use testify by design.
          list-mode: strict
          files:
            - "**/runtime/**"
            - "!**/runtime/**/*_test.go"
            - "!**/examples/**"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - github.com/ghbvf/gocell/runtime
            - github.com/felixge/httpsnoop
            - github.com/fsnotify/fsnotify
            - github.com/go-chi/chi
            - github.com/golang-jwt/jwt
            - github.com/google/uuid
            - github.com/santhosh-tekuri/jsonschema  # runtime/http/schemavalidate body validator
            - github.com/stretchr/testify  # storetest/ test-helper packages
            - go.opentelemetry.io/contrib
            - go.opentelemetry.io/otel
            - golang.org/x/sync
            - gopkg.in/yaml.v3
        adapters-isolation:
          # LAYER-04: adapters/ depend on kernel/ + runtime/ + pkg/ + SDKs.
          # Cell-internal `cells/*/internal/adapters/**` is owned by the cell
          # and governed by the cells-isolation rule, not this one. The
          # `!**/cells/**/adapters/**` exclusion is the boundary.
          list-mode: strict
          files:
            - "**/adapters/**"
            - "!**/adapters/**/*_test.go"
            - "!**/cells/**/adapters/**"
            - "!**/examples/**"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - github.com/ghbvf/gocell/runtime
            - github.com/ghbvf/gocell/adapters
            - github.com/aws/aws-sdk-go-v2
            - github.com/aws/smithy-go
            - github.com/coder/websocket
            - github.com/coreos/go-oidc
            - github.com/google/uuid
            - github.com/hashicorp/vault
            - github.com/jackc/pgx
            - github.com/pressly/goose
            - github.com/prometheus/client_golang
            - github.com/rabbitmq/amqp091-go
            - github.com/redis/go-redis
            - github.com/sony/gobreaker
            - go.opentelemetry.io/otel
            - golang.org/x/oauth2
            - golang.org/x/time
        cells-isolation:
          # LAYER-02: cells/ depend on kernel/ + runtime/ + pkg/. Cell-internal
          # adapters legitimately import SDKs (pgx etc.) — those externals are
          # listed here, not in adapters-isolation, because the file path is
          # `cells/<name>/internal/adapters/**`. Cross-cell internal access and
          # cell-owned subpackage isolation are enforced by archtest LAYER-05/06.
          # generated/contracts is allowed because PR-V1-CODEGEN-FULL-MIGRATION
          # made cells/* call <contractpkg>.NewHandler / NewSubscription instead
          # of constructing wrapper.ContractSpec literals.
          list-mode: strict
          files:
            - "**/cells/**"
            - "!**/cells/**/*_test.go"
            - "!**/examples/**"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - github.com/ghbvf/gocell/runtime
            - github.com/ghbvf/gocell/cells
            - github.com/ghbvf/gocell/generated/contracts
            - github.com/google/uuid
            - github.com/jackc/pgx
            - golang.org/x/crypto
        # Per-example cells-isolation rules. Examples are public-facing demos
        # of the framework's architecture; they must follow the SAME cell
        # discipline as platform cells/ (no cross-layer shortcuts) — otherwise
        # the demos undermine the framework's credibility. Each rule mirrors
        # cells-isolation in shape and adds the own-example subtree to the
        # allow list. Cross-example imports are denied by construction (each
        # rule allows only its OWN example path).
        example-cells-isolation-demo:
          list-mode: strict
          files:
            - "**/examples/demo/cells/**"
            - "!**/examples/demo/cells/**/*_test.go"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - github.com/ghbvf/gocell/runtime
            - github.com/ghbvf/gocell/examples/demo
        example-cells-isolation-iotdevice:
          list-mode: strict
          files:
            - "**/examples/iotdevice/cells/**"
            - "!**/examples/iotdevice/cells/**/*_test.go"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - github.com/ghbvf/gocell/runtime
            - github.com/ghbvf/gocell/examples/iotdevice
            - github.com/ghbvf/gocell/generated/contracts
            - github.com/google/uuid
        example-cells-isolation-todoorder:
          list-mode: strict
          files:
            - "**/examples/todoorder/cells/**"
            - "!**/examples/todoorder/cells/**/*_test.go"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel
            - github.com/ghbvf/gocell/pkg
            - github.com/ghbvf/gocell/runtime
            - github.com/ghbvf/gocell/examples/todoorder
            - github.com/ghbvf/gocell/generated/contracts
            - github.com/google/uuid
            - github.com/go-chi/chi/v5
        generated-contracts-isolation:
          # LAYER-GENERATED-CONTRACTS: generated/contracts/**/*_gen.go files may
          # only import stdlib + kernel/{cell,wrapper,outbox} + pkg/{httputil,errcode}
          # + runtime/auth + chi/v5. This rule prevents template regressions from
          # accidentally pulling cells/ or adapters/ into the generated layer.
          list-mode: strict
          files:
            - "**/generated/contracts/**"
          allow:
            - $gostd
            - github.com/ghbvf/gocell/kernel/cell
            - github.com/ghbvf/gocell/kernel/wrapper
            - github.com/ghbvf/gocell/kernel/outbox
            - github.com/ghbvf/gocell/pkg/httputil
            - github.com/ghbvf/gocell/pkg/errcode
            - github.com/ghbvf/gocell/runtime/auth
            - github.com/go-chi/chi/v5
        typesutil-test-tool-only:
          # PROD-TYPESUTIL-IMPORT-01: tools/typesutil exposes go/types-backed
          # helpers (ResolveReceiverType, ResolveCallee) that depend on
          # golang.org/x/tools/go/types/typeutil. The package is intended for
          # test and archtest tooling only — pulling it into production code
          # would inflate the runtime binary with a test-time dependency and
          # blur the test-tooling/runtime boundary.
          # Exemptions:
          #   - tools/typesutil/ self
          #   - **/tools/** (sibling tools may compose typesutil)
          #   - *_test.go (kernel/governance BFS reachability test and any
          #     future archtest consumers)
          files:
            - "**/*.go"
            - "!**/*_test.go"
            - "!**/tools/**"
          deny:
            - pkg: github.com/ghbvf/gocell/tools/typesutil
              desc: "tools/typesutil is test/tool-only; production code must not import go/types helpers"
        clockmock-test-only:
          # PROD-CLOCKMOCK-IMPORT-01: kernel/clock/clockmock is a test-only
          # package. Production code (non-_test.go) must use clock.Clock via
          # dependency injection — never import clockmock directly.
          # Exemptions:
          #   - tools/archtest/ scans clockmock symbols for archtest wiring
          #   - kernel/clock/clockmock/ self
          #   - **/testutil/ test-helper packages (e.g.
          #     cells/accesscore/internal/testutil/sessionrepo.go) intentionally
          #     own clockmock construction so test callers don't import it
          #     directly. These packages are imported only by *_test.go files;
          #     archtest CLOCK-INJECTION-TEST-CALLSITE-01 enforces that.
          #   - **/storetest/ runtime test-helper packages (mirror of testutil)
          files:
            - "**/*.go"
            - "!**/*_test.go"
            - "!**/tools/archtest/**"
            - "!**/kernel/clock/clockmock/**"
            - "!**/testutil/**"
            - "!**/storetest/**"
          deny:
            - pkg: github.com/ghbvf/gocell/kernel/clock/clockmock
              desc: "clockmock is test-only; production code must inject clock.Clock"
        scaffold-os-ban:
          # SCAFFOLD-WRITE-FUNNEL-DEPGUARD-01: Hard-level enforcement of
          # SCAFFOLD-WRITE-FUNNEL-01. scaffold/codegen writes must funnel through
          # pkg/pathsafe.WritePlannedFiles; direct os import in scaffold paths is
          # statically rejected at lint time (package path level).
          #
          # Two-layer defense:
          #   - depguard scaffold-os-ban → fails at golangci-lint (Hard, package-level)
          #   - tools/archtest/scaffold_write_funnel_test.go → fails at go test
          #     (Medium, type-aware via go/types Info — recognises os calls
          #     across normal import, `import osx "os"` alias, and
          #     `import . "os"` dot-import; reflect/unsafe stays the only
          #     remaining bypass surface)
          #
          # Exempted paths (not in this rule's files list):
          #   - pkg/pathsafe/**   (funnel implementation itself)
          #   - cmd/gocell/app/generate_catalog.go  (user --out path, no containment guarantee)
          #   - cmd/gocell/app/export.go             (user --out path, no containment guarantee)
          #   - *_test.go  (excluded via lax list-mode default test exclusion)
          list-mode: lax
          files:
            - "**/tools/codegen/cellgen/scaffold_bundle.go"
            - "**/tools/codegen/contractgen/generator.go"
            - "**/tools/codegen/contractgen/scope.go"
            - "**/cmd/gocell/app/scaffold_assembly.go"
          deny:
            - pkg: os
              desc: |
                scaffold/codegen writes must funnel through pkg/pathsafe.WritePlannedFiles
                (SCAFFOLD-WRITE-FUNNEL-01 Hard upgrade via depguard).

                All filesystem operations (MkdirAll, WriteFile, OpenFile, Remove, etc.)
                are encapsulated in pkg/pathsafe with O_NOFOLLOW|O_EXCL safety contract.
                Direct os import in this file is statically rejected at lint time.

                Exempted paths (not in this rule's files list): pkg/pathsafe/** (the
                funnel implementation), cmd/gocell/app/generate_catalog.go and
                cmd/gocell/app/export.go (user-supplied --out paths outside root
                containment guarantee), test files (*_test.go), and any other path.

                Files NOT in this ban list intentionally:
                  - tools/codegen/cellgen/scaffold.go: currently has no os import; if
                    added in future, archtest SCAFFOLD-WRITE-FUNNEL-01 (Medium) catches
                    method-level os.* write calls
                  - tools/codegen/writer.go: legitimate os.ReadFile for drift detection
                  - kernel/assembly/generator.go: legitimate os.ReadFile/Stat for go.mod metadata
                  - cmd/gocell/app/scaffold.go: legitimate os.Stat for target dir checks
                  - cmd/gocell/app/generate_catalog.go / export.go: user-supplied --out paths
                    (no root containment guarantee)
                All paths above are still guarded by archtest SCAFFOLD-WRITE-FUNNEL-01
                (Medium, method-level enforcement) for write operations.
        archtest-no-direct-packages-load:
          # ARCHTEST-PASS-FUNNEL Hard-line defense #2: bans tools/archtest/*_test.go
          # from importing `golang.org/x/tools/go/packages` directly. The
          # *packages.Package handle is the load-bearing piece needed to
          # reconstruct INV-1 (pair AST nodes from one load with TypesInfo
          # from another); banning the import at lint level closes that
          # surface independently of the type-aware defense #3.
          #
          # Companion defenses (NOT in this depguard rule):
          #   - Defense #1: archtest.Pass.Pkg is *types.Package, not
          #     *packages.Package (compile-time, see tools/archtest/pass.go).
          #   - Defense #3: type-aware PASS-FUNNEL-* meta-archtest in
          #     tools/archtest/pass_funnel_test.go bans symbol-level usage of
          #     scanner.EachFile / typeseval.LoadPackages / typeseval.SharedResolver
          #     via *types.Info resolution. Path-level banning of
          #     internal/scanner / internal/typeseval is NOT done at lint
          #     level because those packages also export legitimate walk +
          #     resolution helpers (EachInSubtree, ResolvePackageRef, etc.)
          #     that archtest authors are encouraged to use.
          #
          # See docs/architecture/202605141519-adr-archtest-pass-funnel.md
          # and docs/plans/202605141519-040-archtest-pass-funnel-plan.md.
          #
          # Migration exemption: negative globs below list every archtest
          # file that imports packages directly as of stage-1 baseline (27
          # files). These are a subset of archtestmeta.LegacyAllowlist
          # (53 files) — the broader allowlist drives the symbol-level
          # PASS-FUNNEL meta-archtest. Stage 2/3 PRs migrating a file MUST
          # remove its entry from BOTH this depguard glob (if it imports
          # packages) AND archtestmeta.LegacyAllowlist. The
          # TestPassFunnelGuardListSync archtest cross-validates the two
          # lists at test time (fail-loud on drift).
          #
          # pass_funnel_test.go is exempt PERMANENTLY (it implements the
          # PASS-FUNNEL meta-archtest and must import the package it
          # forbids; survives stage-4 cleanup).
          list-mode: lax
          files:
            - "**/tools/archtest/*_test.go"
            # Permanent self-exemption — pass_funnel_test.go IMPLEMENTS the
            # PASS-FUNNEL meta-archtest and therefore must import the very
            # package it forbids. Survives stage-4 cleanup.
            - "!**/tools/archtest/pass_funnel_test.go"
            # Permanent self-exemption — pass_test.go unit-tests archtest.Pass,
            # archtest.Run, archtest.RunTyped, and the internal helpers
            # isPackageWithTestFiles / buildTypedPass / newPackageRel, all of
            # which take or construct *packages.Package fixtures by necessity
            # (Pass.Pkg is *types.Package, but buildTypedPass receives
            # *packages.Package on the input side). Survives stage-4 cleanup.
            - "!**/tools/archtest/pass_test.go"
            # Permanent self-exemption — archtest_test.go is the archtest driver
            # self-test (LAYER-05..10 + PGQUERY-01) that calls
            # depgraph.FromPackages([]*packages.Package). The function is the
            # depgraph constructor (not a governance consumer archtest): it
            # accepts *packages.Package on the input side by structural necessity,
            # mirroring pass_test.go's buildTypedPass input. Survives stage-4.
            # See passFunnelPermanentExempt in pass_funnel_test.go.
            - "!**/tools/archtest/archtest_test.go"
          deny:
            - pkg: golang.org/x/tools/go/packages
              desc: |
                archtest *_test.go must use archtest.RunTyped (driver-constructed Pass).
                Direct packages.Load access would allow reconstructing the INV-1 pattern
                (pair AST nodes from one load with TypesInfo from another).
                See ADR docs/architecture/202605141519-adr-archtest-pass-funnel.md.

    forbidigo:
      forbid:
        - pattern: '^log\.(Printf|Println|Print|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)$'
          msg: "use log/slog (CLAUDE.md observability rule)"
        - pattern: '^fmt\.(Print|Println|Printf)$'
          msg: "use slog (production); cmd/ + examples/ are CLI exempt via files filter"
      analyze-types: true
      exclude-godoc-examples: true

    revive:
      # Minimal opt-in: only the rules whose semantics are CLAUDE.md-anchored.
      # dot-imports replaces tools/archtest/dot_import_test.go's path-grep walk.
      rules:
        - name: dot-imports

    gomodguard:
      blocked:
        modules:
          - github.com/sirupsen/logrus:
              recommendations:
                - log/slog
              reason: "GoCell 统一使用 log/slog（CLAUDE.md 规范）"
          - github.com/pkg/errors:
              recommendations:
                - errors
              reason: "GoCell 使用 stdlib errors + pkg/errcode 包装"
          - github.com/golang/protobuf:
              recommendations:
                - google.golang.org/protobuf
              reason: "golang/protobuf 已 deprecated"
          - nhooyr.io/websocket:
              recommendations:
                - github.com/coder/websocket
              reason: "已迁移至 coder fork (PR-A64a #340)"
          - github.com/dgrijalva/jwt-go:
              recommendations:
                - github.com/golang-jwt/jwt/v5
              reason: "已迁移至 golang-jwt/jwt/v5 (archived 库防再入)"
          - github.com/satori/go.uuid:
              recommendations:
                - github.com/google/uuid
              reason: "satori/go.uuid 已 archived (防再入)"

  exclusions:
    rules:
      # Test fixtures are written under t.TempDir() and never shipped to
      # production; permissions of 0o644/0o755 there are convenience for
      # debug, not a security boundary. gosec G306/G301 in production paths
      # is fixed at the call site (chmod to 0o600/0o750).
      - path: _test\.go
        linters:
          - gosec
        text: "G30(0|1|2|6)"
      # Test setup/table-driven assertions are inherently long and structurally
      # repeat across cases. Production thresholds (funlen 80 / gocognit 15 /
      # cyclop 15 / dupl 150) hurt test readability without a real signal —
      # waive these four linters in *_test.go.
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - cyclop
          - dupl
      - path: ^testdata/
        linters:
          - gosec
        text: "G30(0|1|2|6)"
      # tools/archtest and tools/metricschema scan the repo working tree to
      # produce the static governance verdict; they walk filepath/Walk and
      # ReadFile under a developer-owned tree. G122 (TOCTOU via walk
      # callback) and G703 (path traversal taint after filepath.Clean) are
      # not relevant in this trusted scanner context.
      - path: ^tools/archtest/
        linters:
          - gosec
        text: "G122"
      - path: ^tools/metricschema/
        linters:
          - gosec
        text: "G70(2|3)"
      # rbacassign/service.go: Assign/Revoke are intentionally mirror-image
      # public APIs (per-action audit trail). Source comment documents the
      # decision; dupl flags the duplication structurally.
      - path: ^cells/accesscore/slices/rbacassign/service\.go
        linters:
          - dupl
      # generate_contract.go / verify_codegen_contract.go are intentional
      # mirror implementations of generate_cell.go / verify_codegen_cell.go
      # (K#06 contract DTO codegen, mirroring K#04 cell codegen). The structural
      # similarity is by design; dupl flags it without adding signal.
      - path: ^cmd/gocell/app/generate_(cell|contract)\.go
        linters:
          - dupl
      - path: ^cmd/gocell/app/verify_codegen_(cell|contract)\.go
        linters:
          - dupl
      # token_pair.go: ToTokenPairResponse uses an explicit struct literal to
      # create a wire/model boundary that prevents accidental field
      # auto-leakage when either struct evolves. Source comment documents the
      # decision; staticcheck S1016 (prefer type conversion) is the wrong
      # advice in this specific spot.
      - path: ^cells/accesscore/internal/dto/token_pair\.go
        linters:
          - staticcheck
        text: "S1016"
      # cmdrun.go is the audit point for governance / verify subprocess
      # invocation (gocell validate / gocell check / golangci-lint runner /
      # ...) — ValidatedTool.path is exec.LookPath-resolved + Abs-normalized
      # at NewTool. gosec G204 on the variable binary path is a false
      # positive in this context. Direct exec.Command callers still exist
      # in tests (tools/generatedverify/generatedverify_test.go,
      # examples/ssobff/smoke_test.go) where the binary path is also
      # constant or test-controlled; those test sites are intentionally
      # not routed through cmdrun.
      - path: ^pkg/cmdrun/cmdrun\.go
        linters:
          - gosec
        text: "G204"
      # G404 weak random is suppressed at the call site with line-level
      # //nolint:gosec // G404 R2-approved: ... — see adapters/rabbitmq/
      # connection.go, runtime/eventbus/eventbus.go, runtime/outbox/relay.go.
      # File-level path exemptions would also silence future misuses (e.g.
      # token / nonce / key generation introduced in the same file).
      # G706 log injection (taint analysis) — net/http handler false positive
      # on r.RemoteAddr / r.Method / r.URL.Path: gosec taints these fields
      # and refuses to clear the taint through sanitize helpers. Audit logs
      # need these fields; slog's structured-attr encoding (no format-string
      # interpolation) is not an injection surface in practice.
      - path: ^runtime/http/health/health\.go
        linters:
          - gosec
        text: "G706"
      - path: ^runtime/http/middleware/(recovery|csrf)\.go
        linters:
          - gosec
        text: "G706"
      - path: ^cells/auditcore/slices/auditquery/handler\.go
        linters:
          - gosec
        text: "G706"
      - path: ^adapters/websocket/handler\.go
        linters:
          - gosec
        text: "G706"
      - path: ^adapters/vault/transit_provider\.go
        linters:
          - gosec
        text: "G706"
      # scaffoldfs.FileMode / DirMode are 0o644 / 0o755 by design (scaffold
      # output is committed to git and read by multi-user CI bots). Source
      # comment documents the decision.
      - path: ^pkg/scaffoldfs/perms\.go
        linters:
          - gosec
        text: "G30(1|6)"
      # pkg/errcode/errcode.go is the project-wide error-code dictionary.
      # Every const value is a wire-protocol identifier, never a credential;
      # gosec G101 matches names containing "token" / "password" — 100%
      # false-positive in this file. Keeping the codes as immutable consts
      # (not the var-block-with-string-concat trick that hides the literal
      # from static scanners) matters because importers must not be able
      # to mutate canonical wire identifiers.
      - path: ^pkg/errcode/errcode\.go
        linters:
          - gosec
        text: "G101"
      # cmd/ wiring functions are sequential composition-root assemblies
      # (Provide / LoadSharedDepsFromEnv / NewSSOBFFApp). funlen flags them
      # at 80 lines but breaking apart obscures the reading order — caller
      # must scan the assembly top-to-bottom to understand startup sequence.
      - path: ^cmd/
        linters:
          - funlen
      - path: ^examples/
        linters:
          - funlen
      # cmd/ + examples/ are CLI / demo entrypoints; fmt.Print* is legitimate stdout.
      # Note: this exclusion matches forbidigo's lint message text. If forbidigo
      # changes its message format upstream, the exclusion would silently fail-open.
      # Per-pattern `files` exclusion (forbidigo.forbid[].files with negation) was
      # evaluated against golangci-lint v2.11.4 and does NOT suppress violations —
      # the files field is include-only; negation globs are not applied as exclusions.
      # The text-match approach below is the correct mechanism for this version.
      - path: ^cmd/
        linters:
          - forbidigo
        text: 'fmt\.(Print|Println|Printf)'
      - path: ^examples/
        linters:
          - forbidigo
        text: 'fmt\.(Print|Println|Printf)'
    paths:
      - generated
      - vendor

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ghbvf/gocell
