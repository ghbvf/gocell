version: "2"

linters:
  # Default-enabled: govet, errcheck, staticcheck, unused, ineffassign.
  # gosimple is part of staticcheck in v2.
  enable:
    - gocognit
    - nilerr
    - nilnesserr
    - nilnil

  settings:
    gocognit:
      min-complexity: 15 # project rule: ≤ 15, flag at 15+
    nilnil:
      only-two: false

  exclusions:
    rules:
      # Test files: defer .Close() and similar are acceptable.
      - path: _test\.go
        linters:
          - errcheck
          - gocognit
      # Examples are demo code — allow slightly relaxed checks.
      - path: ^examples/
        linters:
          - errcheck
      # TODO: nhooyr.io/websocket → coder/websocket migration;
      # see backlog LINT-WEBSOCKET-MIGRATION-01 (adapters/websocket/ + runtime/websocket/).
      - path: websocket
        linters:
          - staticcheck
    paths:
      - generated
      - vendor

formatters:
  enable:
    - gofmt
