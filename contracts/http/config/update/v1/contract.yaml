id: http.config.update.v1
kind: http
ownerCell: configcore
consistencyLevel: L2
lifecycle: active
triggers:
  - event.config.entry-upserted.v1
endpoints:
  server: configcore
  clients:
    - edge-bff
  http:
    method: PUT
    path: /api/v1/config/{key}
    pathParams:
      key:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 200
    auth:
      responses:
        - 503
    noContent: false
    responses:
      400:
        description: "Bad request — malformed JSON body or oversized payload"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Not Found — config key does not exist (ERR_CONFIG_REPO_NOT_FOUND)"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      409:
        description: "Conflict — expectedVersion does not match current version (ERR_VERSION_CONFLICT)"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
