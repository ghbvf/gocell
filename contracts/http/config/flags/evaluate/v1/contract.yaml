id: http.config.flags.evaluate.v1
kind: http
ownerCell: configcore
consistencyLevel: L1
lifecycle: active
endpoints:
  server: configcore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/flags/{key}/evaluate
    pathParams:
      key:
        type: string
    successStatus: 200
    noContent: false
    responses:
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated principal lacks the admin role required to evaluate flags (admin-only because evaluation results may include sensitive subject mapping)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
