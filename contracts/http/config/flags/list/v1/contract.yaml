id: http.config.flags.list.v1
kind: http
ownerCell: configcore
consistencyLevel: L1
lifecycle: active
endpoints:
  server: configcore
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/flags/
    queryParams:
      cursor:
        type: string
        required: false
      limit:
        type: integer
        required: false
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated principal lacks the admin role required to enumerate flag keys"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
