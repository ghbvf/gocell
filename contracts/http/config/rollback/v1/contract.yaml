id: http.config.rollback.v1
kind: http
ownerCell: config-core
consistencyLevel: L2
lifecycle: active
endpoints:
  server: config-core
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/config/{key}/rollback
    successStatus: 200
    noContent: false
    responses:
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
