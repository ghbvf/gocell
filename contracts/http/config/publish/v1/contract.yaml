id: http.config.publish.v1
kind: http
ownerCell: configcore
consistencyLevel: L2
lifecycle: active
triggers:
  - event.config.version-published.v1
  - event.config.entry-upserted.v1
endpoints:
  server: configcore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/config/{key}/publish
    pathParams:
      key:
        type: string
    successStatus: 200
    noContent: false
    responses:
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
