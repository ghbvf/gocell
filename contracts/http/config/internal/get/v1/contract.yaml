id: http.config.internal.get.v1
kind: http
ownerCell: configcore
consistencyLevel: L1
lifecycle: active
codegen: true
endpoints:
  server: configcore
  clients:
    - accesscore
  http:
    method: GET
    path: /internal/v1/config/{key}
    pathParams:
      key:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — path parameter key is too short or too long"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid service token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — caller_cell not in contract.clients allowlist"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Config key not found"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
