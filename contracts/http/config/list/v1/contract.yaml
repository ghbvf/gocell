id: http.config.list.v1
kind: http
ownerCell: configcore
consistencyLevel: L1
lifecycle: active
endpoints:
  server: configcore
  clients:
    - accesscore
  http:
    method: GET
    path: /api/v1/config/
    queryParams:
      cursor:
        type: string
        required: false
      limit:
        type: integer
        required: false
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid cursor or limit parameter"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
