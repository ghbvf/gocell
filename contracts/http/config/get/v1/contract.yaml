id: http.config.get.v1
kind: http
ownerCell: configcore
consistencyLevel: L1
lifecycle: active
codegen: true
endpoints:
  server: configcore
  clients:
    - accesscore
  http:
    method: GET
    path: /api/v1/config/{key}
    pathParams:
      key:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter or oversized payload"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated principal lacks the admin role required to read config metadata"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Config key not found"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
