id: http.config.delete.v1
kind: http
ownerCell: configcore
consistencyLevel: L2
lifecycle: active
triggers:
  - event.config.entry-deleted.v1
endpoints:
  server: configcore
  clients:
    - edge-bff
  http:
    method: DELETE
    path: /api/v1/config/{key}
    pathParams:
      key:
        type: string
        minLength: 1
        maxLength: 256
    successStatus: 204
    noContent: true
    responses:
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
