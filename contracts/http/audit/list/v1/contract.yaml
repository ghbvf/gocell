id: http.audit.list.v1
kind: http
ownerCell: auditcore
consistencyLevel: L2
lifecycle: active
endpoints:
  server: auditcore
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/audit/entries
    queryParams:
      cursor:
        type: string
        required: false
      limit:
        type: integer
        required: false
    successStatus: 200
    noContent: false
    responses:
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
