id: http.audit.list.v1
kind: http
ownerCell: auditcore
consistencyLevel: L0
lifecycle: active
codegen: true
endpoints:
  server: auditcore
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/audit/entries
    queryParams:
      actorId:
        type: string
        required: false
        minLength: 0
        maxLength: 256
      cursor:
        type: string
        required: false
        minLength: 0
        maxLength: 4096
      eventType:
        type: string
        required: false
        minLength: 0
        maxLength: 256
      from:
        type: string
        format: date-time
        required: false
        minLength: 0
        maxLength: 64
      limit:
        type: integer
        required: false
        minimum: 1
        maximum: 500
      to:
        type: string
        format: date-time
        required: false
        minLength: 0
        maxLength: 64
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid query parameter format (e.g. from/to not RFC3339, invalid cursor or pageSize)"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
