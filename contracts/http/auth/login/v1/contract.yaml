id: http.auth.login.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
triggers:
  - event.session.created.v1
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/access/sessions/login
    successStatus: 201
    auth:
      public: true
    noContent: false
    responses:
      400:
        description: Invalid login request.
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      401:
        description: "Login failed — uniform response covers missing user / wrong password / inactive account (locked or suspended) to prevent account enumeration. Wire shape: code=ERR_AUTH_LOGIN_FAILED, message=\"invalid credentials\". Server-side slog records the real failure reason via errcode.WithInternal."
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      403:
        description: "ERR_AUTH_PASSWORD_RESET_REQUIRED — token carries password_reset_required=true; client must call change-password before accessing protected endpoints."
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
schemaRefs:
  request: request.schema.json
  response: response.schema.json
