id: http.auth.refresh.v1
kind: http
ownerCell: accesscore
consistencyLevel: L1
lifecycle: active
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/access/sessions/refresh
    successStatus: 200
    noContent: false
    responses:
      400:
        description: Invalid refresh request.
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      401:
        description: Refresh token rejected.
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      503:
        description: Refresh store unavailable.
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
schemaRefs:
  request: request.schema.json
  response: response.schema.json
