id: http.auth.refresh.v1
kind: http
ownerCell: accesscore
consistencyLevel: L1
lifecycle: active
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/access/sessions/refresh
    successStatus: 200
    auth:
      public: true
    noContent: false
    responses:
      400:
        description: Invalid refresh request.
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      401:
        description: Refresh token rejected.
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
      503:
        description: "ERR_SERVICE_UNAVAILABLE - refresh store unavailable. Public message is service unavailable; original internal errcode is logged server-side."
        schemaRef: ../../../../shared/errors/error-response-v1.schema.json
schemaRefs:
  request: request.schema.json
  response: response.schema.json
