id: http.auth.user.create.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
triggers:
  - event.user.created.v1
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/access/users
    successStatus: 201
    auth:
      responses:
        - 503
    noContent: false
    responses:
      400:
        description: "Bad request — request body decode failure or field validation error"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      409:
        description: "Conflict — username already exists (ErrAuthUserDuplicate)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
