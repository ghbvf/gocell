id: http.auth.user.delete.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
codegen: true
triggers:
  - event.user.deleted.v1
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: DELETE
    path: /api/v1/access/users/{id}
    pathParams:
      id:
        type: string
        format: uuid
    successStatus: 204
    noContent: true
    responses:
      400:
        description: "Bad request — path parameter id is not a valid UUID (ERR_VALIDATION_INVALID_UUID)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Not found — user with given id does not exist"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      409:
        description: "Conflict — admin attempting to delete own account (ErrAuthSelfDelete)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
