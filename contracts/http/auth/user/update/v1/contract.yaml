id: http.auth.user.update.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
codegen: true
triggers:
  - event.user.updated.v1
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: PUT
    path: /api/v1/access/users/{id}
    pathParams:
      id:
        type: string
        format: uuid
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — path parameter id is not a valid UUID (ERR_VALIDATION_INVALID_UUID) or request body decode failure"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Not found — user with given id does not exist"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      409:
        description: "Conflict — username already exists (ErrAuthUserDuplicate), email already exists (ErrAuthEmailDuplicate), or version mismatch from concurrent update (ErrAuthConcurrentUpdate)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
