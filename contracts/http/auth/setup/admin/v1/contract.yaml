id: http.auth.setup.admin.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
triggers:
  - event.user.created.v1
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: POST
    path: /api/v1/access/setup/admin
    successStatus: 201
    noContent: false
    auth:
      bootstrap: true
      responses:
        - 401
        - 413
        - 429
    responses:
      400:
        description: "Bad request — missing or blank required fields, oversized username/email, or password outside 8-72 printable ASCII bytes"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      409:
        description: "Conflict — requested first-admin username already belongs to a non-recoverable user or provisioning attempt"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      410:
        description: "Gone — first-run admin already provisioned; endpoint retired for this deployment. Response details carry nextAction=\"login\" only; clients resolve the login endpoint via OpenAPI / contract registry. See docs/architecture/202605061600-adr-bootstrap-admin-boundary.md."
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
