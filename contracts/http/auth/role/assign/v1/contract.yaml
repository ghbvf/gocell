id: http.auth.role.assign.v1
kind: http
ownerCell: accesscore
consistencyLevel: L0
lifecycle: active
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: POST
    path: /internal/v1/access/roles/assign
    successStatus: 201
    responses:
      400:
        description: "Bad request — request body decode failure or userId/roleId blank (ErrAuthRBACInvalidInput)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated but lacks admin role"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Not found — role with given id does not exist (ErrAuthRoleNotFound)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      413:
        description: "Payload Too Large — request body exceeds the size limit"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
  response: response.schema.json
