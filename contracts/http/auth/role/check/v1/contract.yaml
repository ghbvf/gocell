id: http.auth.role.check.v1
kind: http
ownerCell: accesscore
consistencyLevel: L0
lifecycle: active
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/access/roles/{userID}/{roleName}
    pathParams:
      userID:
        type: string
        format: uuid
      roleName:
        type: string
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — path parameter userID is not a valid UUID (ERR_VALIDATION_INVALID_UUID) or roleName is blank"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated subject is neither the target user nor an admin"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
