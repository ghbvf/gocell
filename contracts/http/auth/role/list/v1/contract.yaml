id: http.auth.role.list.v1
kind: http
ownerCell: accesscore
consistencyLevel: L0
lifecycle: active
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: GET
    path: /api/v1/access/roles/{userID}
    pathParams:
      userID:
        type: string
        format: uuid
    queryParams:
      cursor:
        type: string
        required: false
        minLength: 0
        maxLength: 4096
      limit:
        type: integer
        required: false
        minimum: 1
        maximum: 500
    successStatus: 200
    noContent: false
    responses:
      400:
        description: "Bad request — invalid pagination parameter or cursor"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      403:
        description: "Forbidden — authenticated subject is neither the target user nor an admin"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  response: response.schema.json
