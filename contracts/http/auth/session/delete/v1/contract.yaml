id: http.auth.session.delete.v1
kind: http
ownerCell: accesscore
consistencyLevel: L2
lifecycle: active
codegen: true
triggers:
  - event.session.revoked.v1
endpoints:
  server: accesscore
  clients:
    - edge-bff
  http:
    method: DELETE
    path: /api/v1/access/sessions/{id}
    pathParams:
      id:
        type: string
        format: uuid
    successStatus: 204
    noContent: true
    auth:
      passwordResetExempt: true
    responses:
      400:
        description: "Bad request — path parameter id is not a valid UUID (ERR_VALIDATION_INVALID_UUID)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      401:
        description: "Unauthorized — missing or invalid bearer token, or principal subject missing (defense-in-depth)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
      404:
        description: "Not found — session id not found, or owned by another user (IDOR-safe collapse)"
        schemaRef: "../../../../../shared/errors/error-response-v1.schema.json"
schemaRefs:
  request: request.schema.json
